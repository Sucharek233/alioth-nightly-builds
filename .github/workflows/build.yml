name: Build images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5' # Run every friday at midnight

env:
  KERNEL_BRANCH: 6.12.1

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out build configurations
        uses: actions/checkout@v4

      - name: Substitute placeholders in configs
        run: |
          find . -type f -name "*.cfg" -exec sed -i "s|HOME|$(echo $HOME)|;s|NPROC|$(nproc)|" {} +

      - name: Install pmbootstrap from git
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          pmbootstrap --version

      - name: Set up pmaports
        run: |
          echo -e '\n\n' | pmbootstrap init || true
          cd ~/.local/var/pmbootstrap/cache_git/pmaports
          git remote get-url github 2>/dev/null || \
          git remote add github https://github.com/Ayushskull7/pmaports-alioth-new
          git fetch github main
          git checkout github/main -- device-xiaomi-alioth/
          git checkout github/main -- firmware-xiaomi-alioth/
          git checkout github/main -- linux-postmarketos-qcom-sm8250-alioth/
          mv device-xiaomi-alioth device/testing/
          mv firmware-xiaomi-alioth device/testing/
          mv linux-postmarketos-qcom-sm8250-alioth device/testing/

          git status

      - name: Clone kernel sources
        run: |
          git clone https://github.com/mainlining/linux.git --single-branch --branch nikroks/alioth --depth 1 ./linux

      - name: Choose any SM8250 device in pmbootstrap to build kernel
        run: |
          cp xiaomi-alioth.cfg ~/.config/pmbootstrap_v3.cfg

      - name: Compile kernel with envkernel
        run: |
          cd linux
          cp ../alioth_defconfig arch/arm64/configs
          shopt -s expand_aliases
          source ../pmbootstrap/helpers/envkernel.sh
          make alioth_defconfig
          echo "===== VERIFYING CRITICAL KERNEL OPTIONS ====="
          CONFIG=.output/.config
          
          grep -E "CONFIG_ARM64_VA_BITS=48" $CONFIG
          grep -E "CONFIG_PGTABLE_LEVELS=4" $CONFIG
          
          grep -E "^# CONFIG_EFI_ZBOOT is not set" $CONFIG
          
          grep -E "CONFIG_USB=y" $CONFIG
          grep -E "CONFIG_USB_DWC3=y" $CONFIG
          grep -E "CONFIG_USB_DWC3_QCOM=y" $CONFIG
          grep -E "CONFIG_USB_STORAGE=y" $CONFIG
          grep -E "CONFIG_USB_UAS=y" $CONFIG
          grep -E "CONFIG_USB_ROLE_SWITCH=y" $CONFIG
          
          grep -E "CONFIG_SCSI=y" $CONFIG
          grep -E "CONFIG_BLK_DEV_SD=y" $CONFIG
          
          grep -E "CONFIG_NTFS3_FS=y" $CONFIG
          grep -E "CONFIG_VFAT_FS=y" $CONFIG
          grep -E "CONFIG_FAT_FS=y" $CONFIG
          
          echo "===== KERNEL CONFIG VERIFICATION DONE ====="
          make -j$(nproc)
          pmbootstrap build --envkernel linux-postmarketos-qcom-sm8250-alioth

      - name: Create artifact directory
        run: |
          mkdir out

      - name: Build xiaomi-alioth
        run: |
          cp xiaomi-alioth.cfg ~/.config/pmbootstrap_v3.cfg

          pmbootstrap chroot -b -- true || true
          pmbootstrap install --password 147147 || true

          pmbootstrap chroot -b -- true || true
          pmbootstrap install --password 147147

          pmbootstrap export
          cp /tmp/postmarketOS-export/boot.img out/boot-xiaomi-alioth.img
          cp /tmp/postmarketOS-export/xiaomi-alioth.img out/rootfs-xiaomi-alioth.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-alioth
          path: out/*-alioth.img*
          retention-days: 90
